name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          command_timeout: 10m
          script: |
            set -e
            cd /root/muqsit
            # npm install regenerates package-lock.json with platform-specific
            # entries on the VPS, leaving these files locally modified and
            # blocking the next pull. They're safely discarded — npm install
            # right below regenerates them anyway.
            git checkout -- client/package-lock.json server/package-lock.json admin/package-lock.json 2>/dev/null || true
            git pull origin main
            cd client && npm install && npm run build && cd ..
            cd server && npm install && npx prisma generate && npm run build && cd ..
            # Admin build is non-fatal so it can never block the core client/server deploy.
            (cd admin && npm install && npm run build) || echo "admin build failed — continuing"
            pm2 restart all
